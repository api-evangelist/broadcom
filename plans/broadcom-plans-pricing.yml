specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Broadcom
providerId: broadcom
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Infrastructure
  - Gateways
  - Management
  - Networks
  - Observability
  - Virtualization
description: Broadcom does not sell its software portfolio (VMware Cloud Foundation, vSphere Automation,
  Aria Operations for Applications, Symantec, Mainframe products) on a self-service, per-API price list.
  Customers license individual products under enterprise agreements with subscription, perpetual, or core-/CPU-based
  licensing models. The developer.broadcom.com portal provides API specifications, SDKs, and Terraform
  providers but does not publish per-call pricing.
sources:
  - https://developer.broadcom.com/
  - https://www.broadcom.com/products/software
notes: API access ships with the underlying product license; Broadcom does not publish per-API or per-call
  pricing. Reconcile against the customer's enterprise license agreement.
plans:
  - id: broadcom-enterprise-license
    name: Enterprise Software License
    type: enterprise
    description: API access bundled with a Broadcom product license (VMware Cloud Foundation, vSphere,
      Aria Operations, Symantec, Mainframe). Pricing is contracted per agreement and typically tied to
      cores, hosts, sockets, or seats.
    entries:
      - label: Product license
        name: product_license
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: API access
        name: api_access
        type: quota
        metric: request
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: included with product license
        userMultiplied: false
      - label: Support
        name: support
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: VMware Cloud Foundation API
      - name: vSphere Automation API
      - name: Aria Operations for Applications REST API
      - name: VCF Python SDK
      - name: VCF Java SDK
      - name: VCF PowerCLI
      - name: Terraform Providers for VCF
      - name: VMware Marketplace
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
