naftiko: 1.0.0-alpha2
info:
  label: Broadcom Operations for Applications REST API — Sources
  description: 'Broadcom Operations for Applications REST API — Sources. 2 operations. Lead operation: Broadcom List sources.
    Self-contained Naftiko capability covering one Broadcom business surface.'
  tags:
  - Broadcom
  - Sources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BROADCOM_API_KEY: BROADCOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: operations-for-applications-sources
    baseUri: https://{instance}.wavefront.com/api/v2
    description: Broadcom Operations for Applications REST API — Sources business capability. Self-contained, no shared references.
    resources:
    - name: source
      path: /source
      operations:
      - name: listsources
        method: GET
        description: Broadcom List sources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
    - name: source-id
      path: /source/{id}
      operations:
      - name: getsource
        method: GET
        description: Broadcom Get a source
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.BROADCOM_API_KEY}}'
  exposes:
  - type: rest
    namespace: operations-for-applications-sources-rest
    port: 8080
    description: REST adapter for Broadcom Operations for Applications REST API — Sources. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/source
      name: source
      description: REST surface for source.
      operations:
      - method: GET
        name: listsources
        description: Broadcom List sources
        call: operations-for-applications-sources.listsources
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/source/{id}
      name: source-id
      description: REST surface for source-id.
      operations:
      - method: GET
        name: getsource
        description: Broadcom Get a source
        call: operations-for-applications-sources.getsource
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: operations-for-applications-sources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Broadcom Operations for Applications REST API — Sources. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: broadcom-list-sources
      description: Broadcom List sources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: operations-for-applications-sources.listsources
      with:
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: broadcom-get-source
      description: Broadcom Get a source
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: operations-for-applications-sources.getsource
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
