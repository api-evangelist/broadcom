    namespace: operations-for-applications-dashboards
    baseUri: https://{instance}.wavefront.com/api/v2
    description: Broadcom Operations for Applications REST API — Dashboards business capability. Self-contained, no shared
      references.
    resources:
    - name: dashboard
      path: /dashboard
      operations:
      - name: listdashboards
        method: GET
        description: Broadcom List dashboards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offset
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
      - name: createdashboard
        method: POST
        description: Broadcom Create a dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: dashboard-id
      path: /dashboard/{id}
      operations:
      - name: getdashboard
        method: GET
        description: Broadcom Get a dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: updatedashboard
        method: PUT
        description: Broadcom Update a dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedashboard
        method: DELETE
        description: Broadcom Delete a dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.BROADCOM_API_KEY}}'
  exposes:
  - type: rest
    namespace: operations-for-applications-dashboards-rest
    port: 8080
    description: REST adapter for Broadcom Operations for Applications REST API — Dashboards. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/dashboard
      name: dashboard
      description: REST surface for dashboard.
      operations:
      - method: GET
        name: listdashboards
        description: Broadcom List dashboards
        call: operations-for-applications-dashboards.listdashboards
        with:
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdashboard
        description: Broadcom Create a dashboard
        call: operations-for-applications-dashboards.createdashboard
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dashboard/{id}
      name: dashboard-id
      description: REST surface for dashboard-id.
      operations:
      - method: GET
        name: getdashboard
        description: Broadcom Get a dashboard
        call: operations-for-applications-dashboards.getdashboard
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatedashboard
        description: Broadcom Update a dashboard
        call: operations-for-applications-dashboards.updatedashboard
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedashboard
        description: Broadcom Delete a dashboard
        call: operations-for-applications-dashboards.deletedashboard
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
