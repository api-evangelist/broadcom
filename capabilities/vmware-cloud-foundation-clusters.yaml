naftiko: 1.0.0-alpha2
info:
  label: Broadcom VMware Cloud Foundation API — Clusters
  description: 'Broadcom VMware Cloud Foundation API — Clusters. 3 operations. Lead operation: Broadcom List clusters. Self-contained
    Naftiko capability covering one Broadcom business surface.'
  tags:
  - Broadcom
  - Clusters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BROADCOM_API_KEY: BROADCOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: vmware-cloud-foundation-clusters
    baseUri: https://{sddc-manager}/v1
    description: Broadcom VMware Cloud Foundation API — Clusters business capability. Self-contained, no shared references.
    resources:
    - name: clusters
      path: /clusters
      operations:
      - name: listclusters
        method: GET
        description: Broadcom List clusters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clusters-id
      path: /clusters/{id}
      operations:
      - name: getcluster
        method: GET
        description: Broadcom Get cluster details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: updatecluster
        method: PATCH
        description: Broadcom Update a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BROADCOM_API_KEY}}'
  exposes:
  - type: rest
    namespace: vmware-cloud-foundation-clusters-rest
    port: 8080
    description: REST adapter for Broadcom VMware Cloud Foundation API — Clusters. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/clusters
      name: clusters
      description: REST surface for clusters.
      operations:
      - method: GET
        name: listclusters
        description: Broadcom List clusters
        call: vmware-cloud-foundation-clusters.listclusters
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/clusters/{id}
      name: clusters-id
      description: REST surface for clusters-id.
      operations:
      - method: GET
        name: getcluster
        description: Broadcom Get cluster details
        call: vmware-cloud-foundation-clusters.getcluster
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatecluster
        description: Broadcom Update a cluster
        call: vmware-cloud-foundation-clusters.updatecluster
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vmware-cloud-foundation-clusters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Broadcom VMware Cloud Foundation API — Clusters. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: broadcom-list-clusters
      description: Broadcom List clusters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vmware-cloud-foundation-clusters.listclusters
      outputParameters:
      - type: object
        mapping: $.
    - name: broadcom-get-cluster-details
      description: Broadcom Get cluster details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vmware-cloud-foundation-clusters.getcluster
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: broadcom-update-cluster
      description: Broadcom Update a cluster
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: vmware-cloud-foundation-clusters.updatecluster
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
