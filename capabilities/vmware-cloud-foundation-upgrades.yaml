naftiko: 1.0.0-alpha2
info:
  label: Broadcom VMware Cloud Foundation API — Upgrades
  description: 'Broadcom VMware Cloud Foundation API — Upgrades. 1 operations. Lead operation: Broadcom List available upgrades.
    Self-contained Naftiko capability covering one Broadcom business surface.'
  tags:
  - Broadcom
  - Upgrades
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BROADCOM_API_KEY: BROADCOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: vmware-cloud-foundation-upgrades
    baseUri: https://{sddc-manager}/v1
    description: Broadcom VMware Cloud Foundation API — Upgrades business capability. Self-contained, no shared references.
    resources:
    - name: upgrades
      path: /upgrades
      operations:
      - name: listupgrades
        method: GET
        description: Broadcom List available upgrades
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.BROADCOM_API_KEY}}'
  exposes:
  - type: rest
    namespace: vmware-cloud-foundation-upgrades-rest
    port: 8080
    description: REST adapter for Broadcom VMware Cloud Foundation API — Upgrades. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/upgrades
      name: upgrades
      description: REST surface for upgrades.
      operations:
      - method: GET
        name: listupgrades
        description: Broadcom List available upgrades
        call: vmware-cloud-foundation-upgrades.listupgrades
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vmware-cloud-foundation-upgrades-mcp
    port: 9090
    transport: http
    description: MCP adapter for Broadcom VMware Cloud Foundation API — Upgrades. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: broadcom-list-available-upgrades
      description: Broadcom List available upgrades
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vmware-cloud-foundation-upgrades.listupgrades
      outputParameters:
      - type: object
        mapping: $.
