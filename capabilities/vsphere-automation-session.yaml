naftiko: 1.0.0-alpha2
info:
  label: Broadcom vSphere Automation API — Session
  description: 'Broadcom vSphere Automation API — Session. 2 operations. Lead operation: Broadcom Create a session. Self-contained
    Naftiko capability covering one Broadcom business surface.'
  tags:
  - Broadcom
  - Session
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BROADCOM_API_KEY: BROADCOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: vsphere-automation-session
    baseUri: https://{vcenter}/api
    description: Broadcom vSphere Automation API — Session business capability. Self-contained, no shared references.
    resources:
    - name: cis-session
      path: /cis/session
      operations:
      - name: createsession
        method: POST
        description: Broadcom Create a session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletesession
        method: DELETE
        description: Broadcom Delete a session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: vmware-api-session-id
      value: '{{env.BROADCOM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: vsphere-automation-session-rest
    port: 8080
    description: REST adapter for Broadcom vSphere Automation API — Session. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/cis/session
      name: cis-session
      description: REST surface for cis-session.
      operations:
      - method: POST
        name: createsession
        description: Broadcom Create a session
        call: vsphere-automation-session.createsession
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesession
        description: Broadcom Delete a session
        call: vsphere-automation-session.deletesession
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vsphere-automation-session-mcp
    port: 9090
    transport: http
    description: MCP adapter for Broadcom vSphere Automation API — Session. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: broadcom-create-session
      description: Broadcom Create a session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vsphere-automation-session.createsession
      outputParameters:
      - type: object
        mapping: $.
    - name: broadcom-delete-session
      description: Broadcom Delete a session
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: vsphere-automation-session.deletesession
      outputParameters:
      - type: object
        mapping: $.
