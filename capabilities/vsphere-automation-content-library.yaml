naftiko: 1.0.0-alpha2
info:
  label: Broadcom vSphere Automation API — Content Library
  description: 'Broadcom vSphere Automation API — Content Library. 1 operations. Lead operation: Broadcom List content libraries.
    Self-contained Naftiko capability covering one Broadcom business surface.'
  tags:
  - Broadcom
  - Content Library
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BROADCOM_API_KEY: BROADCOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: vsphere-automation-content-library
    baseUri: https://{vcenter}/api
    description: Broadcom vSphere Automation API — Content Library business capability. Self-contained, no shared references.
    resources:
    - name: content-library
      path: /content/library
      operations:
      - name: listcontentlibraries
        method: GET
        description: Broadcom List content libraries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: vmware-api-session-id
      value: '{{env.BROADCOM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: vsphere-automation-content-library-rest
    port: 8080
    description: REST adapter for Broadcom vSphere Automation API — Content Library. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/content/library
      name: content-library
      description: REST surface for content-library.
      operations:
      - method: GET
        name: listcontentlibraries
        description: Broadcom List content libraries
        call: vsphere-automation-content-library.listcontentlibraries
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vsphere-automation-content-library-mcp
    port: 9090
    transport: http
    description: MCP adapter for Broadcom vSphere Automation API — Content Library. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: broadcom-list-content-libraries
      description: Broadcom List content libraries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vsphere-automation-content-library.listcontentlibraries
      outputParameters:
      - type: object
        mapping: $.
