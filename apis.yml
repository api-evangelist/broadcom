apis:
  - aid: broadcom:vsphere-automation
    name: Broadcom vSphere Automation API
    tags:
      - Virtualization
      - Infrastructure
      - Data Center
    humanURL: 
      https://developer.broadcom.com/xapis/vsphere-automation-api/latest/
    properties:
      - url: https://developer.broadcom.com/xapis/vsphere-automation-api/latest/
        type: Documentation
      - url: openapi/broadcom-vsphere-automation-openapi.yml
        type: OpenAPI
      - url: json-schema/broadcom-virtual-machine-schema.json
        type: JSONSchema
      - url: json-schema/broadcom-host-schema.json
        type: JSONSchema
      - url: json-schema/broadcom-cluster-schema.json
        type: JSONSchema
      - url: json-ld/broadcom-context.jsonld
        type: JSONLD
    description: >-
      The vSphere Automation API provides a unified programmatic interface for
      managing VMware vSphere environments. It enables automation of virtual
      machine lifecycle management, host and cluster configuration, content
      library management, tagging, and other vSphere infrastructure operations.
  - aid: broadcom:operations-for-applications
    name: Broadcom Operations for Applications REST API
    tags:
      - Observability
      - Monitoring
      - Metrics
    humanURL: 
      https://developer.broadcom.com/xapis/operations-for-applications-rest-api/latest/
    properties:
      - url: 
          https://developer.broadcom.com/xapis/operations-for-applications-rest-api/latest/
        type: Documentation
      - url: openapi/broadcom-operations-for-applications-openapi.yml
        type: OpenAPI
      - url: json-schema/broadcom-dashboard-schema.json
        type: JSONSchema
      - url: json-schema/broadcom-alert-schema.json
        type: JSONSchema
      - url: json-ld/broadcom-context.jsonld
        type: JSONLD
    description: >-
      The VMware Aria Operations for Applications REST API (formerly Tanzu
      Observability by Wavefront) enables programmatic interaction with the
      observability service. It supports querying metrics, managing dashboards,
      alerts, events, sources, user accounts, API tokens, and ingesting data
      directly.
  - aid: broadcom:vmware-cloud-foundation
    name: Broadcom VMware Cloud Foundation API
    tags:
      - SDDC
      - Cloud Infrastructure
      - Data Center
    humanURL: https://developer.broadcom.com/xapis/sddc-manager-api/latest/
    properties:
      - url: https://developer.broadcom.com/xapis/sddc-manager-api/latest/
        type: Documentation
      - url: openapi/broadcom-vmware-cloud-foundation-openapi.yml
        type: OpenAPI
      - url: json-schema/broadcom-workload-domain-schema.json
        type: JSONSchema
      - url: json-schema/broadcom-task-schema.json
        type: JSONSchema
      - url: json-ld/broadcom-context.jsonld
        type: JSONLD
    description: >-
      The VMware Cloud Foundation API provides RESTful endpoints for managing
      SDDC (Software-Defined Data Center) infrastructure through the SDDC
      Manager. It enables automation of host commissioning, cluster management,
      workload domain lifecycle, network pool configuration, task monitoring,
      and VCF management component deployments.
