specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Broadcom
providerId: broadcom
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Infrastructure
  - Virtualization
  - Observability
  - Rate Limiting
description: Broadcom does not publish unified API rate limits across its software portfolio. Most management
  APIs (vSphere Automation, VMware Cloud Foundation, Aria Operations for Applications) run within the
  customer's own SDDC or SaaS instance, where capacity is bounded by the deployed infrastructure rather
  than a vendor-imposed per-second cap. Aria Operations for Applications enforces ingestion and query
  limits documented per-tenant. Consumers should consult the per-product reference for service-specific
  limits.
sources:
  - https://developer.broadcom.com/
notes: Per-product limits vary; not consolidated on a public page. Reconcile against the relevant product
  documentation.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: vSphere Automation API
    scope: vCenter / SDDC instance
    metric: varies
    limit: 'bounded by customer-deployed infrastructure'
    notes: API throughput is bounded by the customer's vCenter / VCF deployment, not a vendor cap.
  - name: VMware Cloud Foundation (SDDC Manager) API
    scope: SDDC Manager instance
    metric: varies
    limit: 'bounded by customer-deployed infrastructure'
  - name: Aria Operations for Applications REST API
    scope: tenant
    metric: varies
    limit: 'see tenant-specific documentation'
    notes: Tanzu Observability / Wavefront enforces ingestion and query rate limits documented per-tenant.
policies:
  - name: Backoff Strategy
    description: Apply exponential backoff with jitter on 429 / 503 responses; honor Retry-After when
      present.
  - name: Customer-Managed Capacity
    description: For self-managed Broadcom products (vSphere, VCF), API capacity scales with the customer's
      own deployment - sizing the management plane is part of capacity planning.
  - name: SaaS Tenant Limits
    description: For SaaS products (Aria Operations for Applications), ingestion and query limits are
      tenant-specific and documented per service.
  - name: Capacity Increase
    description: Higher SaaS-tenant capacity is negotiated through Broadcom support / sales as part of
      the license agreement.
maintainers:
