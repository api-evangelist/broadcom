specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Broadcom
providerId: broadcom
publisherName: Broadcom Inc.
serviceCategory: Enterprise Software & Infrastructure
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Infrastructure
  - Virtualization
  - Observability
  - Mainframe
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Broadcom: enterprise license agreements covering VMware Cloud
  Foundation, vSphere, Aria Operations, Symantec, and Mainframe products. Pricing is core / CPU / socket
  / seat based and contracted per agreement; APIs ship with the underlying product license rather than
  being separately metered.'
sources:
  - https://developer.broadcom.com/
  - https://www.broadcom.com/products/software
notes: Broadcom is not metered per API call; cost is governed by the enterprise license agreement.
billingModel:
  pricingCategory: Enterprise License
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Broadcom
  ServiceCategory: Enterprise Software
  ProviderName: Broadcom
  PublisherName: Broadcom Inc.
  InvoiceIssuerName: Broadcom Inc.
  BillingCurrency: USD
  PricingCategory: Standard
  PricingUnit: license-year
meters:
  - name: license_cores
    description: Per-core licensing for VCF / vSphere subscription editions.
    unit: core
    aggregation: max
    dimensions:
      - product
      - edition
      - cluster
  - name: license_hosts
    description: Per-host licensing where applicable.
    unit: host
    aggregation: max
    dimensions:
      - product
      - cluster
  - name: aria_operations_pps
    description: Aria Operations for Applications metered by points-per-second / data-point ingestion.
    unit: point-per-second
    aggregation: max
    dimensions:
      - tenant
      - source
  - name: support_subscription
    description: Annual support subscription tied to the product license.
    unit: year
    aggregation: max
    dimensions:
      - product
      - support_tier
principles:
  - name: Visibility
    description: Pull license entitlements from the Broadcom Support Portal, ingestion / query usage
      from Aria Operations dashboards, and reconcile against the contracted license counts and SaaS
      ceilings.
  - name: Allocation
    description: Allocate VCF / vSphere license cost to hosting infrastructure cost centers; allocate
      Aria Operations ingestion to the consuming application teams.
  - name: Optimization
    description: Right-size cluster core counts before renewal, retire idle observability sources to
      lower points-per-second, consolidate SDDC instances, and time license true-ups with capacity reviews.
  - name: Accountability
    description: Designate a Broadcom license owner per product line; review entitlement vs deployed
      usage on a quarterly cadence and forecast renewals against infrastructure roadmaps.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
